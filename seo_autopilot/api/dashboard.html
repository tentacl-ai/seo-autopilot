<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Autopilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #e8e6e1;
      --border-light: #f0ede8;
      --text: #1a1a1a;
      --text-muted: #6b6560;
      --text-light: #9e9990;
      --orange: #e8540a;
      --orange-light: #fef3ed;
      --orange-hover: #d14a08;
      --green: #16a34a;
      --green-light: #f0fdf4;
      --yellow: #ca8a04;
      --yellow-light: #fefce8;
      --red: #dc2626;
      --red-light: #fef2f2;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
      --shadow: 0 4px 12px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.04);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html { font-size: 16px; }
    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── PAGE SECTIONS ── */
    .page { display: none; min-height: 100vh; }
    .page.active { display: flex; }

    /* ── AUTH PAGES (Setup + Login) ── */
    .auth-page {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: var(--orange);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    .logo-icon svg { color: #fff; }

    .logo-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      display: block;
    }

    .logo-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      display: block;
      margin-top: 0.2rem;
    }

    .auth-heading {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .auth-sub {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.375rem;
    }

    .field input {
      width: 100%;
      padding: 0.65rem 0.875rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9375rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: var(--orange);
      background: #fff;
    }

    .btn {
      width: 100%;
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--orange);
      color: #fff;
    }

    .btn-primary:hover { background: var(--orange-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: var(--red-light);
      color: var(--red);
      border-radius: var(--radius-sm);
      padding: 0.625rem 0.875rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error-msg.visible { display: block; }

    /* ── DASHBOARD ── */
    .dashboard-page {
      flex-direction: column;
    }

    /* Header */
    .dash-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .dash-header-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .dash-logo-icon {
      width: 30px;
      height: 30px;
      background: var(--orange);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dash-logo-icon svg { color: #fff; }

    .dash-header-logo span {
      font-size: 0.9375rem;
      font-weight: 600;
    }

    .dash-domain {
      font-size: 0.875rem;
      color: var(--text-muted);
      background: var(--bg);
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-weight: 500;
    }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.35rem 0.75rem;
      font-family: inherit;
      font-size: 0.8125rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-logout:hover {
      background: var(--red-light);
      color: var(--red);
      border-color: var(--red);
    }

    /* Main content */
    .dash-content {
      padding: 2rem 1.5rem;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    /* Score ring */
    .score-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .score-ring-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      margin-bottom: 1rem;
    }

    .score-ring-wrap svg {
      transform: rotate(-90deg);
    }

    .score-ring-bg {
      fill: none;
      stroke: var(--border);
      stroke-width: 10;
    }

    .score-ring-fill {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s;
    }

    .score-number {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .score-label {
      font-size: 0.8125rem;
      color: var(--text-muted);
      text-align: center;
      display: block;
      margin-top: 0.2rem;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
    }

    .stat-num {
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .stat-num.red { color: var(--red); }
    .stat-num.yellow { color: var(--yellow); }
    .stat-num.green { color: var(--green); }
    .stat-num.orange { color: var(--orange); }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Audit actions */
    .audit-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .last-audit-info {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    .btn-run {
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.6rem 1.25rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-run:hover { background: var(--orange-hover); }
    .btn-run:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Loading state */
    .loading-bar {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .loading-bar.visible { display: block; }

    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* Issues list */
    .issues-section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .issue-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.125rem;
      margin-bottom: 0.75rem;
      transition: box-shadow 0.15s;
    }

    .issue-card:hover { box-shadow: var(--shadow); }

    .issue-header {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .issue-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 0.1rem; }

    .issue-body { flex: 1; min-width: 0; }

    .issue-title {
      font-weight: 600;
      font-size: 0.9375rem;
      margin-bottom: 0.2rem;
    }

    .issue-desc {
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .issue-badge {
      font-size: 0.6875rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .badge-high { background: var(--red-light); color: var(--red); }
    .badge-medium { background: var(--yellow-light); color: var(--yellow); }
    .badge-low { background: var(--green-light); color: var(--green); }

    .ai-fix {
      margin-top: 0.75rem;
      background: var(--orange-light);
      border: 1px solid #f5c9a8;
      border-radius: var(--radius-sm);
      padding: 0.625rem 0.875rem;
    }

    .ai-fix-label {
      font-size: 0.6875rem;
      font-weight: 700;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    .ai-fix-text {
      font-size: 0.8125rem;
      color: var(--text);
      line-height: 1.5;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      color: var(--border);
      margin-bottom: 1rem;
    }

    .empty-state p { font-size: 0.9375rem; }

    /* Responsive */
    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .auth-box { padding: 1.75rem 1.25rem; }
      .dash-domain { display: none; }
    }
  </style>
</head>
<body>

<!-- ══ PAGE 1: SETUP ══════════════════════════════════════ -->
<section id="page-setup" class="page auth-page">
  <div class="auth-box">
    <div class="logo-area">
      <div class="logo-icon">
        <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <span class="logo-title">SEO Autopilot</span>
    </div>
    <h1 class="auth-heading">Willkommen – einmalige Einrichtung</h1>
    <p class="auth-sub">Trage deine Website-URL ein und wähle ein Passwort. Danach startet der erste SEO-Audit automatisch.</p>
    <div id="setup-error" class="error-msg"></div>
    <div class="field">
      <label for="setup-url">Deine Website-URL</label>
      <input id="setup-url" type="url" placeholder="https://deine-webseite.de" autocomplete="url">
    </div>
    <div class="field">
      <label for="setup-pw">Passwort wählen</label>
      <input id="setup-pw" type="password" placeholder="Mindestens 4 Zeichen" autocomplete="new-password">
    </div>
    <div class="field">
      <label for="setup-pw2">Passwort bestätigen</label>
      <input id="setup-pw2" type="password" placeholder="Nochmal eingeben" autocomplete="new-password">
    </div>
    <button id="setup-btn" class="btn btn-primary" onclick="doSetup()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      Einrichten &amp; ersten Audit starten
    </button>
  </div>
</section>

<!-- ══ PAGE 2: LOGIN ═════════════════════════════════════ -->
<section id="page-login" class="page auth-page">
  <div class="auth-box">
    <div class="logo-area">
      <div class="logo-icon">
        <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <span class="logo-title">SEO Autopilot</span>
      <span id="login-domain" class="logo-subtitle"></span>
    </div>
    <div id="login-error" class="error-msg"></div>
    <div class="field">
      <label for="login-pw">Passwort</label>
      <input id="login-pw" type="password" placeholder="Dein Passwort" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button id="login-btn" class="btn btn-primary" onclick="doLogin()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Anmelden
    </button>
  </div>
</section>

<!-- ══ PAGE 3: DASHBOARD ══════════════════════════════════ -->
<section id="page-dashboard" class="page dashboard-page">

  <header class="dash-header">
    <div class="dash-header-logo">
      <div class="dash-logo-icon">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <span>SEO Autopilot</span>
    </div>
    <span id="dash-domain" class="dash-domain"></span>
    <button class="btn-logout" onclick="doLogout()">Abmelden</button>
  </header>

  <main class="dash-content">

    <!-- Score Ring -->
    <div class="score-section">
      <div class="score-ring-wrap">
        <svg width="160" height="160" viewBox="0 0 160 160">
          <circle class="score-ring-bg" cx="80" cy="80" r="70"/>
          <circle id="score-ring-fill" class="score-ring-fill" cx="80" cy="80" r="70"
            stroke-dasharray="439.82"
            stroke-dashoffset="439.82"/>
        </svg>
        <div class="score-number" id="score-num">–</div>
      </div>
      <span class="score-label">SEO Score</span>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num red" id="stat-high">–</div>
        <div class="stat-label">Kritisch</div>
      </div>
      <div class="stat-card">
        <div class="stat-num yellow" id="stat-med">–</div>
        <div class="stat-label">Mittel</div>
      </div>
      <div class="stat-card">
        <div class="stat-num green" id="stat-low">–</div>
        <div class="stat-label">Gering</div>
      </div>
      <div class="stat-card">
        <div class="stat-num orange" id="stat-fixes">–</div>
        <div class="stat-label">AI-Fixes</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="audit-actions">
      <span id="last-audit-ts" class="last-audit-info"></span>
      <button id="run-btn" class="btn-run" onclick="startAudit()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Neuen Audit starten
      </button>
    </div>

    <!-- Loading -->
    <div id="loading-bar" class="loading-bar">
      <div class="spinner"></div>
      <div class="loading-text" id="loading-text">Audit läuft – das dauert ca. 1–2 Minuten…</div>
    </div>

    <!-- Issues -->
    <div class="issues-section">
      <h2 id="issues-heading">Issues</h2>
      <div id="issues-list"></div>
    </div>

  </main>
</section>

<script>
(function() {

  // ── Base URL ──────────────────────────────────────────────
  const path = window.location.pathname;
  const base = window.location.origin + (path.startsWith('/seo-autopilot') ? '/seo-autopilot' : '');

  // ── Helpers ───────────────────────────────────────────────
  function show(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function token() { return localStorage.getItem('seo_token') || ''; }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token() };
  }

  async function api(method, path, body) {
    const opts = { method, headers: authHeaders() };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(base + path, opts);
    return r;
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError(id) {
    document.getElementById(id).classList.remove('visible');
  }

  function setBtn(id, loading, text) {
    const b = document.getElementById(id);
    b.disabled = loading;
    if (text) b.querySelector('svg') && (b.innerHTML = b.innerHTML); // keep svg
    const last = b.childNodes[b.childNodes.length - 1];
    if (last && last.nodeType === 3) last.textContent = ' ' + text;
  }

  // ── Startup ───────────────────────────────────────────────
  async function init() {
    try {
      const r = await fetch(base + '/api/setup-status');
      const data = await r.json();

      if (!data.configured) {
        show('page-setup');
        return;
      }

      // Show domain on login
      if (data.domain) {
        document.getElementById('login-domain').textContent = data.domain;
      }

      // Check existing token
      const tok = token();
      if (tok) {
        const me = await api('GET', '/api/me');
        if (me.ok) {
          const meData = await me.json();
          document.getElementById('dash-domain').textContent = meData.domain || data.domain;
          show('page-dashboard');
          loadDashboard();
          return;
        }
        localStorage.removeItem('seo_token');
      }

      show('page-login');
    } catch(e) {
      show('page-login');
    }
  }

  // ── Setup ─────────────────────────────────────────────────
  window.doSetup = async function() {
    hideError('setup-error');
    const url = document.getElementById('setup-url').value.trim();
    const pw  = document.getElementById('setup-pw').value;
    const pw2 = document.getElementById('setup-pw2').value;

    if (!url || !url.startsWith('http')) {
      showError('setup-error', 'Bitte eine gültige URL eingeben (https://...)');
      return;
    }
    if (pw.length < 4) {
      showError('setup-error', 'Passwort muss mindestens 4 Zeichen haben.');
      return;
    }
    if (pw !== pw2) {
      showError('setup-error', 'Passwörter stimmen nicht überein.');
      return;
    }

    const btn = document.getElementById('setup-btn');
    btn.disabled = true;
    btn.textContent = 'Einrichten…';

    try {
      const r = await fetch(base + '/api/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ site_url: url, password: pw })
      });
      const data = await r.json();
      if (!r.ok) {
        showError('setup-error', data.detail || 'Fehler beim Einrichten.');
        btn.disabled = false;
        btn.textContent = 'Einrichten & ersten Audit starten';
        return;
      }

      // Auto-login
      const lr = await fetch(base + '/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const ld = await lr.json();
      if (lr.ok && ld.token) {
        localStorage.setItem('seo_token', ld.token);
        document.getElementById('dash-domain').textContent = data.domain || ld.domain || '';
        show('page-dashboard');
        loadDashboard(true);
      }
    } catch(e) {
      showError('setup-error', 'Verbindungsfehler. Bitte Seite neu laden.');
      btn.disabled = false;
      btn.textContent = 'Einrichten & ersten Audit starten';
    }
  };

  // ── Login ─────────────────────────────────────────────────
  window.doLogin = async function() {
    hideError('login-error');
    const pw = document.getElementById('login-pw').value;
    if (!pw) { showError('login-error', 'Bitte Passwort eingeben.'); return; }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;

    try {
      const r = await fetch(base + '/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await r.json();
      if (!r.ok) {
        showError('login-error', 'Falsches Passwort.');
        btn.disabled = false;
        return;
      }
      localStorage.setItem('seo_token', data.token);
      document.getElementById('dash-domain').textContent = data.domain || '';
      show('page-dashboard');
      loadDashboard();
    } catch(e) {
      showError('login-error', 'Verbindungsfehler.');
      btn.disabled = false;
    }
  };

  // ── Logout ────────────────────────────────────────────────
  window.doLogout = async function() {
    await api('POST', '/api/logout');
    localStorage.removeItem('seo_token');
    location.reload();
  };

  // ── Dashboard ─────────────────────────────────────────────
  async function loadDashboard(autoStart) {
    try {
      const r = await api('GET', '/api/audits?project_id=main-site&limit=1');
      if (!r.ok) return;
      const audits = await r.json();

      if (!audits || audits.length === 0) {
        // Kein Audit vorhanden → automatisch starten
        await triggerAndPoll();
        return;
      }

      const latest = audits[0];
      if (autoStart) {
        // Nach Setup immer frischen Audit starten
        await triggerAndPoll();
        return;
      }

      // Letzten Audit anzeigen
      const detail = await api('GET', '/api/audits/' + latest.id);
      if (detail.ok) {
        const audit = await detail.json();
        renderAudit(audit);
      }
    } catch(e) {
      console.error('loadDashboard error', e);
    }
  }

  window.startAudit = async function() {
    await triggerAndPoll();
  };

  async function triggerAndPoll() {
    const runBtn = document.getElementById('run-btn');
    runBtn.disabled = true;

    document.getElementById('loading-bar').classList.add('visible');
    document.getElementById('loading-text').textContent = 'Audit läuft – das dauert ca. 1–2 Minuten…';

    try {
      // Trigger audit
      const r = await api('POST', '/api/audits/run/main-site', { project_id: 'main-site', run_async: true });
      if (!r.ok) throw new Error('Audit konnte nicht gestartet werden');

      // Poll bis Ergebnis da
      await pollForResult();
    } catch(e) {
      document.getElementById('loading-text').textContent = 'Fehler: ' + e.message;
      setTimeout(() => {
        document.getElementById('loading-bar').classList.remove('visible');
        runBtn.disabled = false;
      }, 3000);
    }
  }

  async function pollForResult() {
    const maxWait = 180; // 3 Minuten
    let waited = 0;

    while (waited < maxWait) {
      await sleep(5000);
      waited += 5;

      try {
        const r = await api('GET', '/api/audits?project_id=main-site&limit=1');
        if (!r.ok) continue;
        const audits = await r.json();
        if (!audits || audits.length === 0) continue;

        const a = audits[0];
        if (a.status === 'completed') {
          // Hole Details
          const dr = await api('GET', '/api/audits/' + a.id);
          if (dr.ok) {
            const detail = await dr.json();
            document.getElementById('loading-bar').classList.remove('visible');
            document.getElementById('run-btn').disabled = false;
            renderAudit(detail);
            return;
          }
        }
      } catch(e) {
        // weiter versuchen
      }
    }

    // Timeout
    document.getElementById('loading-text').textContent = 'Audit dauert länger als erwartet – bitte Seite neu laden.';
    document.getElementById('run-btn').disabled = false;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function renderAudit(audit) {
    // Score
    const score = audit.score || 0;
    animateScore(score);

    // Stats
    const issues = audit.issues || [];
    const high = issues.filter(i => i.severity === 'high').length;
    const med  = issues.filter(i => i.severity === 'medium').length;
    const low  = issues.filter(i => i.severity === 'low').length;
    const fixes = issues.filter(i => i.fix_suggestion).length;

    document.getElementById('stat-high').textContent  = high;
    document.getElementById('stat-med').textContent   = med;
    document.getElementById('stat-low').textContent   = low;
    document.getElementById('stat-fixes').textContent = fixes;

    // Timestamp
    if (audit.completed_at) {
      const d = new Date(audit.completed_at);
      document.getElementById('last-audit-ts').textContent =
        'Letzter Audit: ' + d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' })
        + ' ' + d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' }) + ' Uhr';
    }

    // Issues
    const sorted = [...issues].sort((a, b) => {
      const order = { high: 0, medium: 1, low: 2 };
      return (order[a.severity] ?? 3) - (order[b.severity] ?? 3);
    });

    const list = document.getElementById('issues-list');
    document.getElementById('issues-heading').textContent = `Issues (${issues.length})`;

    if (sorted.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <p>Keine Issues gefunden. Deine Seite sieht gut aus!</p>
        </div>`;
      return;
    }

    list.innerHTML = sorted.map(issue => {
      const icon   = issue.severity === 'high' ? '❌' : issue.severity === 'medium' ? '⚠️' : 'ℹ️';
      const badge  = `badge-${issue.severity || 'low'}`;
      const label  = issue.severity === 'high' ? 'Kritisch' : issue.severity === 'medium' ? 'Mittel' : 'Gering';
      const fixHtml = issue.fix_suggestion ? `
        <div class="ai-fix">
          <div class="ai-fix-label">AI-Fix</div>
          <div class="ai-fix-text">${escHtml(issue.fix_suggestion)}</div>
        </div>` : '';
      return `
        <div class="issue-card">
          <div class="issue-header">
            <span class="issue-icon">${icon}</span>
            <div class="issue-body">
              <div class="issue-title">${escHtml(issue.title || '')}</div>
              <div class="issue-desc">${escHtml(issue.description || '')}</div>
              ${fixHtml}
            </div>
            <span class="issue-badge ${badge}">${label}</span>
          </div>
        </div>`;
    }).join('');
  }

  function animateScore(score) {
    const circumference = 2 * Math.PI * 70; // 439.82
    const ring = document.getElementById('score-ring-fill');
    const numEl = document.getElementById('score-num');

    // Color based on score
    let color = '#dc2626';
    if (score >= 80) color = '#16a34a';
    else if (score >= 60) color = '#ca8a04';
    else if (score >= 40) color = '#e8540a';

    ring.style.stroke = color;

    // Animate number
    let current = 0;
    const step = score / 40;
    const timer = setInterval(() => {
      current = Math.min(current + step, score);
      numEl.textContent = Math.round(current);
      if (current >= score) clearInterval(timer);
    }, 25);

    // Animate ring
    setTimeout(() => {
      const offset = circumference - (score / 100) * circumference;
      ring.style.strokeDashoffset = offset;
    }, 50);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Start ─────────────────────────────────────────────────
  init();

})();
</script>
</body>
</html>
