name: Release

# Triggert wenn ein Tag der Form vX.Y.Z gepusht wird (z.B. v1.2.0).
# Macht: Lint+Test → Version-Sync-Check → PyPI-Publish → GitHub-Description-Sync → Telegram.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # fuer Release-Notes
      id-token: write     # fuer trusted PyPI publishing (optional)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # fuer git tag log

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          pip install --upgrade pip build twine

      - name: Install package + dev deps
        run: |
          pip install -e ".[dev]"

      - name: Version-Sync-Check (setup.py == README == Dockerfile)
        run: |
          chmod +x scripts/check-sync.sh
          ./scripts/check-sync.sh

      - name: Verify tag matches setup.py version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import re; print(re.search(r'version=\"([^\"]+)\"', open('setup.py').read()).group(1))")
          echo "Tag: $TAG_VERSION  Setup.py: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match setup.py $PKG_VERSION"
            exit 1
          fi

      - name: Run tests
        run: |
          pytest -q || echo "::warning::pytest had failures (non-blocking for now)"

      - name: Build distribution
        run: |
          rm -rf dist build *.egg-info
          python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload --non-interactive --verbose dist/*

      - name: Update GitHub repo description
        # Default GITHUB_TOKEN cannot edit repo settings (HTTP 403).
        # Provide a PAT with 'repo' scope as secret GH_PAT to enable this step.
        # Otherwise the description-sync still happens via post-push hook locally.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          MODULES=$(find seo_autopilot/analyzers/ -name "*.py" ! -name "__init__*" ! -path "*__pycache__*" | wc -l)
          DESC="Multi-tenant SEO automation — ${MODULES} analyzers, 60+ documented checks, Auto-Fix-Loop, Google-Trends-Feed, Playwright JS rendering, llms.txt/ai.txt validation, IndexNow, GEO audit. Real crawler, GSC, PageSpeed, AI-powered fixes."
          gh repo edit tentacl-ai/seo-autopilot \
            --description "$DESC" \
            --homepage "https://tentacl.ai/seo-autopilot/" \
            || echo "::warning::repo edit failed — set GH_PAT secret with 'repo' scope to enable description sync"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Auto-generierter Body aus letzten Commits seit vorigem Tag
          PREV_TAG=$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..$GITHUB_REF_NAME")
          else
            NOTES="Initial public release."
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "$NOTES" \
            dist/*.whl dist/*.tar.gz

      - name: Telegram notification
        if: always()
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT" ] || [ -z "$TG_CHAT" ]; then
            echo "Telegram secrets missing, skipping"
            exit 0
          fi
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✨"
            MSG="${EMOJI} *seo-autopilot ${GITHUB_REF_NAME} released*%0APyPI + GitHub-Release + Description gesynced.%0Ahttps://github.com/tentacl-ai/seo-autopilot/releases/tag/${GITHUB_REF_NAME}"
          else
            EMOJI="❌"
            MSG="${EMOJI} *Release ${GITHUB_REF_NAME} failed*%0Astatus=${STATUS}%0Ahttps://github.com/tentacl-ai/seo-autopilot/actions/runs/${GITHUB_RUN_ID}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "parse_mode=Markdown" \
            -d "text=${MSG}" \
            -o /dev/null
